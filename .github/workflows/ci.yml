name: ci

on:
  pull_request:
  push:
    branches:
      - main
      - dev

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Foreman tools
        run: |
          curl -L https://github.com/Roblox/foreman/releases/download/v1.7.0/foreman-linux-x86_64.zip -o foreman.zip
          unzip -q foreman.zip -d foreman-bin
          chmod +x foreman-bin/foreman
          ./foreman-bin/foreman install

      - name: Show tool versions
        run: |
          ./foreman-bin/foreman run rojo --version
          ./foreman-bin/foreman run selene --version
          ./foreman-bin/foreman run stylua --version
          ./foreman-bin/foreman run wally --version

      - name: Generate Rojo sourcemap
        run: ./foreman-bin/foreman run rojo sourcemap default.project.json --output sourcemap.json

      - name: Lint with Selene
        run: ./foreman-bin/foreman run selene lib

      - name: Check formatting with StyLua
        run: ./foreman-bin/foreman run stylua --check lib Linking.lua

      - name: Validate roblox-ts declarations
        run: test -f types/index.d.ts

  build-dev:
    if: github.ref == 'refs/heads/dev'
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Foreman tools
        run: |
          curl -L https://github.com/Roblox/foreman/releases/download/v1.7.0/foreman-linux-x86_64.zip -o foreman.zip
          unzip -q foreman.zip -d foreman-bin
          chmod +x foreman-bin/foreman
          ./foreman-bin/foreman install

      - name: Build testing place
        run: |
          mkdir -p build
          ./foreman-bin/foreman run rojo build testing.project.json --output build/InputSystemTesting.rbxlx

      - name: Upload testing artifact
        uses: actions/upload-artifact@v4
        with:
          name: InputSystemTesting
          path: build/InputSystemTesting.rbxlx

  package-main:
    if: github.ref == 'refs/heads/main'
    needs: quality
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      WALLY_AUTH_TOKEN: ${{ secrets.WALLY_AUTH_TOKEN }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Foreman tools
        run: |
          curl -L https://github.com/Roblox/foreman/releases/download/v1.7.0/foreman-linux-x86_64.zip -o foreman.zip
          unzip -q foreman.zip -d foreman-bin
          chmod +x foreman-bin/foreman
          ./foreman-bin/foreman install

      - name: Build distributable model
        run: |
          mkdir -p build
          ./foreman-bin/foreman run rojo build pack.project.json --output build/InputSystem.rbxm

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: InputSystem-rbxm
          path: build/InputSystem.rbxm

      - name: Publish to Wally
        if: env.WALLY_AUTH_TOKEN != ''
        run: ./foreman-bin/foreman run wally publish

      - name: Create draft GitHub release
        run: |
          VERSION=$(grep '^version =' wally.toml | sed -E 's/version = "([^"]+)"/\1/')
          TAG="v${VERSION}-${GITHUB_SHA::7}"
          gh release create "$TAG" build/InputSystem.rbxm --draft --title "InputSystem ${VERSION}" --notes "Automated draft release for ${GITHUB_SHA}."
