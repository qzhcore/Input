name: ci

on:
  pull_request:
  push:
    branches:
      - main
      - dev

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Foreman tools
        run: |
          FOREMAN_DIR="$RUNNER_TEMP/foreman"
          mkdir -p "$FOREMAN_DIR"
          curl -L https://github.com/Roblox/foreman/releases/download/v1.7.0/foreman-linux-x86_64.zip -o "$FOREMAN_DIR/foreman.zip"
          unzip -q "$FOREMAN_DIR/foreman.zip" -d "$FOREMAN_DIR"
          chmod +x "$FOREMAN_DIR/foreman"
          echo "$FOREMAN_DIR" >> "$GITHUB_PATH"
          echo "$HOME/.foreman/bin" >> "$GITHUB_PATH"
          "$FOREMAN_DIR/foreman" install

      - name: Show tool versions
        run: |
          "$HOME/.foreman/bin/rojo" --version || true
          "$HOME/.foreman/bin/selene" --version || true
          "$HOME/.foreman/bin/stylua" --version || true
          "$HOME/.foreman/bin/wally" --version || true

      - name: Generate Rojo sourcemap
        run: "$HOME/.foreman/bin/rojo" sourcemap default.project.json --output sourcemap.json

      - name: Lint with Selene
        run: "$HOME/.foreman/bin/selene" lib

      - name: Check formatting with StyLua
        run: "$HOME/.foreman/bin/stylua" --check lib Linking.lua

      - name: Validate roblox-ts declarations
        run: test -f types/index.d.ts

  build-dev:
    if: github.ref == 'refs/heads/dev'
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Foreman tools
        run: |
          FOREMAN_DIR="$RUNNER_TEMP/foreman"
          mkdir -p "$FOREMAN_DIR"
          curl -L https://github.com/Roblox/foreman/releases/download/v1.7.0/foreman-linux-x86_64.zip -o "$FOREMAN_DIR/foreman.zip"
          unzip -q "$FOREMAN_DIR/foreman.zip" -d "$FOREMAN_DIR"
          chmod +x "$FOREMAN_DIR/foreman"
          echo "$FOREMAN_DIR" >> "$GITHUB_PATH"
          echo "$HOME/.foreman/bin" >> "$GITHUB_PATH"
          "$FOREMAN_DIR/foreman" install

      - name: Build testing place
        run: |
          mkdir -p build
          "$HOME/.foreman/bin/rojo" build testing.project.json --output build/InputSystemTesting.rbxlx

      - name: Upload testing artifact
        uses: actions/upload-artifact@v4
        with:
          name: InputSystemTesting
          path: build/InputSystemTesting.rbxlx

  package-main:
    if: github.ref == 'refs/heads/main'
    needs: quality
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      WALLY_AUTH_TOKEN: ${{ secrets.WALLY_AUTH_TOKEN }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Foreman tools
        run: |
          FOREMAN_DIR="$RUNNER_TEMP/foreman"
          mkdir -p "$FOREMAN_DIR"
          curl -L https://github.com/Roblox/foreman/releases/download/v1.7.0/foreman-linux-x86_64.zip -o "$FOREMAN_DIR/foreman.zip"
          unzip -q "$FOREMAN_DIR/foreman.zip" -d "$FOREMAN_DIR"
          chmod +x "$FOREMAN_DIR/foreman"
          echo "$FOREMAN_DIR" >> "$GITHUB_PATH"
          echo "$HOME/.foreman/bin" >> "$GITHUB_PATH"
          "$FOREMAN_DIR/foreman" install

      - name: Build distributable model
        run: |
          mkdir -p build
          "$HOME/.foreman/bin/rojo" build pack.project.json --output build/InputSystem.rbxm

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: InputSystem-rbxm
          path: build/InputSystem.rbxm

      - name: Publish to Wally
        if: env.WALLY_AUTH_TOKEN != ''
        run: "$HOME/.foreman/bin/wally" publish

      - name: Create draft GitHub release
        run: |
          VERSION=$(grep '^version =' wally.toml | sed -E 's/version = "([^"]+)"/\1/')
          TAG="v${VERSION}-${GITHUB_SHA::7}"
          gh release create "$TAG" build/InputSystem.rbxm --draft --title "InputSystem ${VERSION}" --notes "Automated draft release for ${GITHUB_SHA}."
